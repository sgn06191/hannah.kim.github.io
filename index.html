<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hannah Kim</title>

    <style>
        body {
            margin: 0;
            color: #111;
            font-family: Georgia, "Times New Roman", serif;
        }

        .container {
            width: 92%;
            max-width: 1100px;
            margin: 30px auto 0;
        }

        .name {
            margin: 0 0 30px 0;
            font-size: 42px;
            font-weight: 700;
            line-height: 1.2;
        }

        .profile-section {
            display: flex;
            align-items: flex-start;
            gap: 40px;
            min-height: 260px;
        }

        .profile-image {
            width: 185px;
            height: 230px;
            object-fit: cover;
        }

        .profile-text {
            font-size: 16px;
            line-height: 1.65;
        }

        .email {
            margin-top: 45px;
        }

        .email-label {
            font-weight: bold;
        }

        .email a {
            color: #111;
        }

        .bottom-bar {
            height: 5px;
            margin-top: 30px;
            background-color: #ededed;
        }

        @media (max-width: 650px) {
            .name {
                font-size: 36px;
                margin-bottom: 20px;
            }

            .profile-section {
                flex-direction: column;
                gap: 20px;
            }

            .profile-image {
                width: 160px;
                height: 200px;
            }

            .email {
                margin-top: 25px;
            }
        }
    </style>
</head>

<body>
    <main class="container">

        <h1 class="name">Hannah Kim</h1>

        <section class="profile-section">

            <img
                class="profile-image"
                src="./Hannah_Kim.jpg"
                alt="Hannah Kim"
            >

            <div class="profile-text">
                <p>
                    I am currently a second-year Ph.D. student in Economics at
                    The University of Texas at Austin.
                </p>

                <p>
                    My research interests are in health economics,
                    industrial organization, and applied microeconomics.
                </p>

                <p class="email">
                    <span class="email-label">Email:</span>
                    <a href="mailto:hkim.econ@utexas.edu">
                        hkim.econ@utexas.edu
                    </a>
                </p>
            </div>

        </section>

        <div class="bottom-bar"></div>
    </main>
</body>

</html>
