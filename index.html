<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hannah Kim</title>

    </head>
<body>
    <h1>Hannah Kim</h1>
</body>
    

    <style>
        body {
            margin: 0;
            background-color: white;
            color: #111;
            font-family: Georgia, "Times New Roman", serif;
        }

        .container {
            width: 92%;
            max-width: 1100px;
            margin: 30px auto 0;
        }

        .profile-section {
            display: flex;
            align-items: flex-start;
            gap: 40px;
            min-height: 260px;
        }

        .profile-image {
            width: 185px;
            height: 230px;
            object-fit: cover;
            object-position: center;
        }

        .profile-text {
            padding-top: 3px;
            font-size: 16px;
            line-height: 1.65;
        }

        .intro {
            margin-top: 0;
            color: #0047cc;
        }

        .email {
            margin-top: 45px;
        }

        .email-label {
            font-weight: bold;
        }

        .email a {
            color: #111;
        }

        .bottom-bar {
            width: 100%;
            height: 5px;
            margin-top: 30px;
            background-color: #ededed;
        }

        @media (max-width: 650px) {
            .profile-section {
                flex-direction: column;
                gap: 20px;
            }

            .profile-image {
                width: 160px;
                height: 200px;
            }

            .email {
                margin-top: 25px;
            }

            .bottom-bar {
                margin-top: 35px;
            }
        }
    </style>
</head>

<body>

    <main class="container">

        <section class="profile-section">

            <img
                class="profile-image"
                src="Hannah_Kim.jpg"
                alt="Profile pic"
            >

            <div class="profile-text">
               

                <p>
                    I'm currently second year Ph.D. Student in Economics at
                    The University of Texas at Austin.
                </p>

                <p>
                    My research interests are in health economics,
                    industrial organization, and applied microeconomics.
                </p>

                <p class="email">
                    <span class="email-label">Email</span>
                    <a href="mailto:hkim.econ@utexas.edu">
                        hkim.econ@utexas.edu
                    </a>
                </p>
            </div>

        </section>

        <div class="bottom-bar"></div>

    </main>

</body>
</html>
